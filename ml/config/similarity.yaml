metric: cosine
algorithm: brute

# =========================
# FEATURE LISTS ONLY
# =========================

outfield_features:
  - goals_per_90
  - assists_per_90
  - shots_per_90
  - interceptions
  - tackles_won
  - yellow_cards
  - red_cards
  - points_per_match
  - goal_difference_per_90
  - on_off_difference

goalkeeper_features:
  - save_percentage
  - goals_conceded_per_90
  - clean_sheet_percentage
  - saves
  - shots_on_target_against
  - wins
  - draws
  - losses
  - yellow_cards
  - red_cards


